name: Deploy aiden-redesign to GitHub Pages

on:
  push:
    branches:
      - claude/magic-ui-component-s6aeip
      - main
    paths:
      - "aiden-redesign/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: aiden-redesign

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
